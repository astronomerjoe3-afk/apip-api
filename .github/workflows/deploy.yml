name: Deploy apip-api to Cloud Run

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: apip-dev-487809
  REGION: asia-southeast1
  REPO: apip-repo
  SERVICE: apip-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/335099777427/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@apip-dev-487809.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Firestore indexes
        shell: bash
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          set +e
          npx firebase-tools@14.22.0 deploy \
            --only firestore:indexes \
            --project "${PROJECT_ID}" \
            --config firebase.json \
            --non-interactive 2>&1 | tee "${log_file}"
          status=${PIPESTATUS[0]}
          set -e

          if [ "${status}" -eq 0 ]; then
            echo "Firestore indexes deployed successfully." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if grep -qiE "caller does not have permission|http error: 403|permission denied" "${log_file}"; then
            {
              echo "Firestore index deployment was skipped because the GitHub deploy service account cannot manage Firestore indexes in ${PROJECT_ID}."
              echo
              echo "The API deploy continued. Grant Firestore index administration permissions to re-enable automated index rollout from CI."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Skipping Firestore index deployment because the deploy service account lacks index permissions."
            exit 0
          fi

          exit "${status}"

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "APP_COMMIT=${GITHUB_SHA},GIT_COMMIT_SHA=${GITHUB_SHA}"
